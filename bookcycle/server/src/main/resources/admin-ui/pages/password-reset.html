<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Forgot Password</h1>
      <p>Enter your admin email. If the account exists, a reset link is sent via Keycloak email.</p>

      <div th:if="${errorMessage}" class="notice error" th:text="${errorMessage}">error</div>

      <form th:action="@{/admin/password-reset}" method="post" style="margin-top: 12px;">
        <input class="input" type="email" name="email" placeholder="admin@bookcycle.local"
               th:value="${email}" required />
        <button class="button primary" type="submit" style="width: 100%;">Send reset email</button>
      </form>

      <a th:href="@{/admin/login}" style="display: inline-block; margin-top: 12px; color: #fff;">
        Back to login
      </a>
    </div>
  </div>
</body>
</html>
