<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password</title>
  <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Change Initial Password</h1>
      <p th:if="${required}">Temporary password detected. Set your personal password now.</p>
      <p th:unless="${required}">Use this form if your account was created with a temporary password.</p>

      <div th:if="${errorMessage}" class="notice error" th:text="${errorMessage}">error</div>

      <form th:action="@{/admin/password-change}" method="post" style="margin-top: 12px;">
        <input class="input" type="email" name="email" placeholder="admin@bookcycle.local"
               th:value="${email}" required />
        <input class="input" type="password" name="currentPassword" placeholder="Temporary password" required />
        <input class="input" type="password" name="newPassword" placeholder="New password" minlength="8" required />
        <input class="input" type="password" name="confirmPassword" placeholder="Confirm new password" minlength="8" required />
        <button class="button primary" type="submit" style="width: 100%;">Update password</button>
      </form>

      <a th:href="@{/admin/login}" style="display: inline-block; margin-top: 12px; color: #fff;">
        Back to login
      </a>
    </div>
  </div>
</body>
</html>
