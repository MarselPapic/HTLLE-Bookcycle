<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Bookcycle Admin</h1>
      <p>Sign in in the admin webapp with your role account.</p>
      <div th:if="${param.logout}" class="notice success">
        Signed out successfully.
      </div>
      <div th:if="${param.error}" class="notice error">
        Login failed. Please verify credentials and role assignment.
      </div>
      <div th:if="${errorMessage}" class="notice error" th:text="${errorMessage}">
        error
      </div>
      <div th:if="${successMessage}" class="notice success" th:text="${successMessage}">
        success
      </div>
      <form th:action="@{/admin/login}" method="post" style="margin-top: 12px;">
        <input class="input" type="email" name="username" placeholder="admin@bookcycle.local" required />
        <input class="input" type="password" name="password" placeholder="Password" required />
        <button class="button primary" type="submit" style="width: 100%;">Sign in</button>
      </form>
      <a th:href="@{/admin/password-reset}" class="button ghost"
         style="display: block; width: 100%; margin-top: 8px; text-align: center; color: #fff; border-color: rgba(255, 255, 255, 0.45);">
        Forgot password?
      </a>
      <a th:href="@{/admin/password-change}" style="display: inline-block; margin-top: 12px; color: #fff;">
        First login / temporary password?
      </a>
    </div>
  </div>
</body>
</html>
