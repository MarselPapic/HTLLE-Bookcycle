<div xmlns:th="http://www.thymeleaf.org" th:fragment="statCard(title, value, subtitle)">
  <div class="card">
    <h3 th:text="${title}">Title</h3>
    <div class="value" th:text="${value}">0</div>
    <div class="meta" th:text="${subtitle}">Subtitle</div>
  </div>
</div>

<span xmlns:th="http://www.thymeleaf.org" th:fragment="statusBadge(status)">
  <span class="badge" th:classappend="${status.toString().toLowerCase()}">
    <span th:text="${status}">OPEN</span>
  </span>
</span>
