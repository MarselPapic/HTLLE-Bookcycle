spring:
  application:
    name: bookcycle-server
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://postgres:5432/bookcycle
    username: bookcycle
    password: bookcycle123
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    show-sql: false
    open-in-view: false

  thymeleaf:
    prefix: classpath:/admin-ui/pages/
    suffix: .html
    cache: false
  
  # OAuth2 Resource Server (JWT from Keycloak)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.keycloak.internal-issuer-base:http://localhost:8180}/realms/${app.keycloak.mobile-realm:bookcycle-mobile}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    com.bookcycle: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator (Health Checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# API Documentation (OpenAPI/Swagger)
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  show-actuator: true

# Application-specific configuration
app:
  name: Bookcycle
  version: 1.0.0
  keycloak:
    admin-url: ${APP_KEYCLOAK_ADMIN_URL:http://localhost:8180}
    admin-realm: ${APP_KEYCLOAK_ADMIN_REALM:master}
    admin-username: ${KEYCLOAK_ADMIN:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin123}
    realm: ${APP_KEYCLOAK_MOBILE_REALM:bookcycle-mobile}
    mobile-realm: ${APP_KEYCLOAK_MOBILE_REALM:bookcycle-mobile}
    webadmin-realm: ${APP_KEYCLOAK_WEBADMIN_REALM:bookcycle-webadmin}
    client-id: ${APP_KEYCLOAK_BACKEND_CLIENT_ID:bookcycle-backend}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me-in-production}
    mobile-client-id: ${APP_KEYCLOAK_MOBILE_CLIENT_ID:bookcycle-mobile}
    webadmin-client-id: ${APP_KEYCLOAK_WEBADMIN_CLIENT_ID:bookcycle-webadmin}
    webadmin-client-secret: ${KEYCLOAK_WEBADMIN_CLIENT_SECRET:webadmin-client-secret}
    internal-issuer-base: ${APP_KEYCLOAK_INTERNAL_ISSUER_BASE:http://localhost:8180}
    issuers:
      - http://localhost:8180/realms/bookcycle-mobile
      - http://localhost:8180/realms/bookcycle-webadmin
  mail:
    smtp:
      host: mailpit
      port: 1025
      from: noreply@bookcycle.local
  jwt:
    access-token-expiration: 3600
    refresh-token-expiration: 86400
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080,http://localhost:19000
