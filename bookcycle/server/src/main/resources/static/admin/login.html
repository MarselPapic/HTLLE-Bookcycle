<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BookCycle Admin Login</title>
    <link rel="stylesheet" href="/admin/assets/css/admin.css" />
  </head>
  <body class="auth-page">
    <main>
      <section class="auth-card">
        <div class="inner">
          <div class="brand">
            <div class="brand-mark">🔒</div>
            <div class="brand-name">
              <span>BookCycle Admin</span>
            </div>
          </div>
          <h1>Admin Access</h1>
          <p>Enter your credentials to manage BookCycle.</p>
          <form>
            <div class="field">
              <label for="email">Email Address</label>
              <input class="input" id="email" type="email" placeholder="admin@bookcycle.com" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input class="input" id="password" type="password" placeholder="********" />
            </div>
            <button class="btn primary" type="button" style="width: 100%">Sign In</button>
          </form>
        </div>
        <div class="auth-note">Restricted area. Authorized personnel only.</div>
      </section>
      <div class="center-note">© BookCycle Admin System</div>
    </main>
  </body>
</html>
